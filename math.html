<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/classroom/favicon.png">
    <title>Home</title>
    <style>
        /* Same CSS as before */
        h1 {
            font-family: Gill Sans;
            text-align: Center;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: monospace;
            overflow-x: hidden;
            background-color: #f0f0f0;
        }

        .taskbar {
            font-family: monospace;
            background-color: rgba(89, 94, 255, 0.6); /* Blue-Purple color with some transparency */
            color: white;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: fixed;
            width: 100px; /* Width of the circle */
            height: 100px; /* Height of the circle */
            border-radius: 50%; /* Makes the taskbar circular */
            top: 20px; /* Position from the top */
            left: 20px; /* Position from the left */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            text-align: center;
        }

        .taskbar-logo {
            font-family: monospace;
            font-size: 1rem;
            font-weight: bold;
        }

        .taskbar-nav {
            display: flex;
            font-family: monospace;
            flex-direction: column;
        }

        .taskbar-nav a {
            color: white;
            text-decoration: none;
            margin: 5px 0;
            font-size: 0.9rem;
            font-family: monospace;
            transition: color 0.3s;
        }

        .taskbar-nav a:hover {
            color: #d1e0e0;
            font-family: monospace;
        }

        .card {
            background-color: #ffffff;
            height: calc(100vh - 60px); /* Adjust height for taskbar */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            margin: 20px;
            font-family: monospace;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            padding-bottom: 20px;
            color: #333;
        }

        .card-text {
            font-size: 1.2rem;
            color: #666;
        }

        #site-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
            background-color: #ffffff;
            margin: 0 auto;
        }

        .site-preview {
            margin: 15px;
            text-align: center;
            padding: 15px;
            width: 200px;
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border: 1px solid #ddd;
            border-radius: 10px;
            transition: transform 0.2s ease-in-out;
            cursor: pointer;
        }

        .site-preview img {
            width: 100%;
            height: auto;
            border-bottom: 1px solid #ddd;
            border-radius: 10px 10px 0 0;
        }

        .site-preview h3 {
            margin: 10px 0;
            font-size: 1.2rem;
            color: #333;
        }

        .site-preview a {
            display: block;
            color: #007bff;
            text-decoration: none;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 5px;
        }

        .site-preview a:hover {
            background-color: #e9ecef;
        }

        .site-preview:hover {
            transform: scale(1.05);
        }

        .button-link {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            margin: 10px 0;
            display: inline-block;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .button-link:hover {
            background-color: #0056b3;
        }

        .nav-bar {
            background-color: rgba(138, 43, 226, 0.6); /* Increased transparency */
            backdrop-filter: blur(10px); /* Stronger frosted glass effect */
            border-radius: 20px;
            padding: 8px 30px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            width: calc(100% - 60px);
            max-width: 1000px;
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000; /* Always on top */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .nav-bar:hover {
            transform: translate(-50%, -5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #D8BFD8;
            margin-right: 30px;
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            flex-grow: 1;
            justify-content: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 16px;
            transition: color 0.3s, transform 0.3s;
        }

        .nav-links a:hover {
            color: #D8BFD8;
            transform: scale(1.1);
        }

        .search-bar {
            display: flex;
            align-items: center;
            background-color: #fff;
            border-radius: 15px;
            padding: 4px 8px;
            margin-left: 30px;
            width: 180px;
            transition: width 0.3s ease;
        }

        .search-bar input {
            border: none;
            outline: none;
            width: 100%;
            padding: 4px;
            border-radius: 15px;
            font-size: 14px;
        }

        .search-bar input::placeholder {
            color: #8A2BE2;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="logo" onclick="window.location.href='index.html'">@</div>
        <div class="nav-links">
            <a href="math.html">games</a>
            <a href="apps.html">apps</a>
        </div>
        <div class="search-bar">
            <form action="math.html" method="GET">
                <input type="text" placeholder="Search..." name="q">
            </form>
        </div>
    </div>
    <h1><br><br>All Games</h1>

    <div id="site-container"></div>

    <script>
        // Define the list of games
        const sites = [
            {"title": "1v1lol", "link": "/gmes/1v1lol/index.html", "image": "/gmes/1v1lol/logo.png"},
            {"title": "Animalcrossing", "link": "/gmes/animalcrossing/index.html", "image": "/gmes/animalcrossing/splash.jpg"},
            {"title": "Bitlife", "link": "/gmes/bitlife/index.html", "image": "/gmes/bitlife/logo.png"},
            {"title": "Bunny Graveyard", "link": "/gmes/bunny-graveyard/index.html", "image": "/gmes/bunny-graveyard/bunny-graveyard-image.png"},
            {"title": "Chrome Dino", "link": "/gmes/chrome-dino/index.html", "image": "/gmes/chrome-dino/icons/icon-256.png"},
            {"title": "Doodle Jump", "link": "/gmes/doodle-jump/index.html", "image": "/gmes/doodle-jump/doodle.png"},
            {"title": "Eaglercraft", "link": "/gmes/eaglercraft/index.html", "image": "/gmes/eaglercraft/eaglercraft-image.jpg"},
            {"title": "Eggycar", "link": "/gmes/eggycar/index.html", "image": "/gmes/eggycar/eggy-car.png"},
            {"title": "Fnaf", "link": "/gmes/fnaf/index.html", "image": "/gmes/fnaf/00a70bb1caf8629ba3808e1fb2be6178.png"},
            {"title": "Geodash", "link": "/gmes/geodash/index.html", "image": "/gmes/geodash/geoscratchicon.png"},

            {"title": "Half Life", "link": "/gmes/half-life/index.html", "image": "/gmes/half-life/half-life-image.png"},
            {"title": "Infinite Mario", "link": "/gmes/infinite-mario/main.html", "image": "/gmes/infinite-mario/images/logo.gif"},
            {"title": "Jelly Mario", "link": "/gmes/jelly-mario/index.html", "image": "/gmes/jelly-mario/logo.jpg"},
            {"title": "Just Fall", "link": "/gmes/just-fall/index.html", "image": "/gmes/just-fall/splash.jpg"},
            {"title": "Match Me", "link": "/gmes/match-me/e.html", "image": "/gmes/no-image"},
            {"title": "Minecraft", "link": "/gmes/minecraft/index.html", "image": "/gmes/minecraft/logo.png"},
            {"title": "Minecraft 18", "link": "/gmes/minecraft-18/index.html", "image": "/gmes/minecraft-18/splash.png"},
            {"title": "Minecraft Classic", "link": "/gmes/minecraft-classic/index.html", "image": "/gmes/minecraft-classic/pack.png"},
            {"title": "Minecraftbeta", "link": "/gmes/minecraftbeta/index.html", "image": "/gmes/minecraftbeta/bg_main.png"},
            {"title": "Paper Io 2", "link": "/gmes/paper-io-2/index.html", "image": "/gmes/paper-io-2/images/logo.png"},
            {"title": "Portal Flash", "link": "/gmes/portal-flash/index.html", "image": "/gmes/portal-flash/portaltheflashversion.jpg"},
            {"title": "Retro Bowl", "link": "/gmes/retro-bowl/index.html", "image": "/gmes/retro-bowl/img/splash.png"},
            {"title": "Rolly Vortex", "link": "/gmes/rolly-vortex/index.html", "image": "/gmes/rolly-vortex/rolly-vortex-image.jpg"},

            {"title": "Run", "link": "/gmes/run/index.html", "image": "/gmes/run/run.png"},
            {"title": "Run2", "link": "/gmes/run2/index.html", "image": "/gmes/run2/run-2-logo.jpg"},
            {"title": "Run3", "link": "/gmes/run3/run3.html", "image": "/gmes/run3/thumb.png"},
            {"title": "Sandboxels", "link": "/gmes/sandboxels/index.html", "image": "/gmes/sandboxels/sandboxels.jpg"},
            {"title": "Sister Location", "link": "/gmes/sister-location/index.html", "image": "/gmes/sister-location/sister-location.jpg"},
            {"title": "Slitherio", "link": "/gmes/slitherio/slitherio.html", "image": "/gmes/slitherio/splash.jpeg"},
            {"title": "Slope", "link": "/gmes/slope/index.html", "image": "/gmes/slope/slope-image.png"},
            {"title": "SM64", "link": "/gmes/sm64/index.html", "image": "/gmes/sm64/logo.png"},
            {"title": "Smashkarts", "link": "/gmes/smashkarts/index.html", "image": "/gmes/smashkarts/images/smashkarts.png"},
            {"title": "Subway Surfers", "link": "/gmes/subway-surfers/index.html", "image": "/gmes/subway-surfers/img/splash.jpg"},
            {"title": "Superhot", "link": "/gmes/superhot/index.html", "image": "/gmes/superhot/hot.jpg"},
            {"title": "Unity", "link": "/gmes/unity/index.html", "image": "/gmes/no-image"},
            {"title": "Vex2", "link": "/gmes/vex2/vex2.html", "image": "/gmes/vex2/splash.jpeg"},
            {"title": "Vex3", "link": "/gmes/vex3/index.html", "image": "/gmes/vex3/vex3.png"},
            {"title": "Vex4", "link": "/gmes/vex4/index.html", "image": "/gmes/vex4/vex4.png"},
            {"title": "Vex5", "link": "/gmes/vex5/index.html", "image": "/gmes/vex5/vex.jpeg"},
            {"title": "Vex6", "link": "/gmes/vex6/index.html", "image": "/gmes/vex6/assets/images/logo.png"},
            {"title": "Vex7", "link": "/gmes/vex7/index.html", "image": "/gmes/vex7/assets/images/logo.png"},
            {"title": "Vex8", "link": "/gmes/vex8/index.html", "image": "/gmes/vex8/assets/images/logo.png"},
            {"title": "Webretro", "link": "/gmes/webretro/index.html", "image": "/gmes/webretro/thumb.jpg"},
            {"title": "Wolf2d", "link": "/gmes/wolf2d/index.html", "image": "/gmes/wolf2d/icons/[icon-256].png"},
            {"title": "Wolf3d", "link": "/gmes/wolf3d/index.html", "image": "/gmes/wolf3d/art/wolf3d.png"},
            {"title": "Zombs Royale", "link": "/gmes/zombs-royale/index.html", "image": "/gmes/zombs-royale/zomb.png"}
        ];

        // Get the search query from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const query = urlParams.get('q');

        // Filter sites based on the query
        const filteredSites = query ? sites.filter(site => site.title.toLowerCase().includes(query.toLowerCase())) : sites;

        // Remove the search query from the URL
        if (query) {
            urlParams.delete('q');
            const newUrl = `${window.location.pathname}?${urlParams.toString()}`;
            window.history.replaceState({}, '', newUrl);
        }

        // Display the sites
        const container = document.getElementById('site-container');
        filteredSites.forEach(site => {
            const siteDiv = document.createElement('div');
            siteDiv.className = 'site-preview';

            siteDiv.innerHTML = `
                <img src="${site.image}" alt="${site.title} Preview">
                <h3>${site.title}</h3>
                <a href="${site.link}">Play Now</a>
            `;

            container.appendChild(siteDiv);
        });
    </script>
    
</body>
</html>
